# 气象数据平台凭据配置（本地使用，不上传 Git）
# 使用前请确保此文件权限为 600: chmod 600 credentials.yaml

open_meteo:
  # Open-Meteo 无需凭据，直接调用
  enabled: true

qweather:
  enabled: true
  api_host: "YOUR_API_HOST"  # 从 https://console.qweather.com 设置页面获取
  api_key: "YOUR_API_KEY"    # 从 https://console.qweather.com 创建项目获取
  # 注意：2026年起旧地址（devapi.qweather.com）已停用，必须用专属 Host

caiyun:
  enabled: true
  # v2.6 使用 token 参数（简单方式）
  token: "YOUR_TOKEN"        # 从 https://platform.caiyunapp.com Token 管理获取
  # v3 使用 AppKey + AppSecret + HMAC-SHA256 签名
  app_key: "YOUR_APP_KEY"
  app_secret: "YOUR_APP_SECRET"

ibm_weather:
  enabled: true
  api_key: "YOUR_API_KEY"    # 从 https://developer.ibm.com/apis/catalog/weather-data 获取
  # IBM Weather Company (weather.com) API
  # 提供中国民航机场METAR实测数据（Ground Truth）

# NASA POWER 和 Open-Meteo 无需凭据，直接调用
